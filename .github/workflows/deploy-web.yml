name: Deploy Web UI to vector.korroni.cloud

on:
  push:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: deployment

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_MCP_URL=${{ secrets.MCP_URL }}
            SECRET_PATH=${{ secrets.WEB_SECRET_PATH }}
            API_KEY=${{ secrets.WEB_API_KEY }}

      - name: Output image
        id: image
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: deployment

    steps:
      - name: Deploy Web UI to korroni.cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Set variables
            CONTAINER_NAME="epstein-vector-web"
            IMAGE_NAME="${{ needs.build-and-push.outputs.image }}"
            NETWORK="${{ secrets.DOCKER_NETWORK || 'root_default' }}"
            DOMAIN="${{ vars.DEPLOY_DOMAIN }}"

            echo "Starting deployment of Epstein Vector Search Web UI..."

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull the latest image
            echo "Pulling latest image..."
            docker pull "$IMAGE_NAME"

            # Stop existing container if running
            if docker ps --format "table {{.Names}}" | grep -q "^$CONTAINER_NAME$"; then
              echo "Stopping existing container..."
              docker stop "$CONTAINER_NAME"
            fi

            # Remove existing container if it exists
            if docker ps -a --format "table {{.Names}}" | grep -q "^$CONTAINER_NAME$"; then
              echo "Removing existing container..."
              docker rm "$CONTAINER_NAME"
            fi

            # Run the new container with Traefik labels (catch-all for non-API paths)
            echo "Starting new container..."
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --network "$NETWORK" \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.epstein-vector-web.rule=Host(\`$DOMAIN\`)" \
              -l "traefik.http.routers.epstein-vector-web.priority=1" \
              -l "traefik.http.routers.epstein-vector-web.tls=true" \
              -l "traefik.http.routers.epstein-vector-web.tls.certresolver=myresolver" \
              -l "traefik.http.services.epstein-vector-web.loadbalancer.server.port=3000" \
              "$IMAGE_NAME"

            # Wait for container to be ready
            echo "Waiting for container to be ready..."
            sleep 10

            # Check if container is running
            if docker ps --format "table {{.Names}}" | grep -q "^$CONTAINER_NAME$"; then
              echo "Container is running!"

              if curl -f -s https://"$DOMAIN"/health > /dev/null 2>&1; then
                echo "Web UI health check passed!"
              else
                echo "Health check failed, but container is running"
                echo "Container logs:"
                docker logs --tail 50 "$CONTAINER_NAME"
              fi
            else
              echo "Container failed to start!"
              docker logs "$CONTAINER_NAME"
              exit 1
            fi

            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -f

            echo "Deployment completed!"
            echo "Web UI available at: https://$DOMAIN"
