name: Deploy to vector.korroni.cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: deployment

    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Output image
        id: image
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: deployment

    steps:
      - name: Deploy to korroni.cloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Set variables
            CONTAINER_NAME="epstein-vector-api"
            PG_CONTAINER="epstein-vector-pg"
            IMAGE_NAME="${{ needs.build-and-push.outputs.image }}"
            NETWORK="${{ secrets.DOCKER_NETWORK || 'root_default' }}"
            DOMAIN="vector.korroni.cloud"

            echo "Starting deployment of Epstein Vector Search..."

            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # --- Ensure Postgres is running ---
            if ! docker ps --format "table {{.Names}}" | grep -q "^$PG_CONTAINER$"; then
              echo "Starting PostgreSQL with pgvector..."
              docker rm "$PG_CONTAINER" 2>/dev/null || true
              docker run -d \
                --name "$PG_CONTAINER" \
                --restart unless-stopped \
                --network "$NETWORK" \
                -e POSTGRES_USER=epstein \
                -e POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}" \
                -e POSTGRES_DB=epstein \
                -v epstein-vector-pgdata:/var/lib/postgresql/data \
                pgvector/pgvector:pg17 \
                -c shared_buffers=16GB \
                -c work_mem=256MB \
                -c effective_cache_size=24GB \
                -c maintenance_work_mem=1GB
              echo "Waiting for Postgres to be ready..."
              sleep 10
            else
              echo "PostgreSQL already running"
            fi

            # --- Deploy API container ---

            # Pull the latest image
            echo "Pulling latest image..."
            docker pull "$IMAGE_NAME"

            # Stop existing container if running
            if docker ps --format "table {{.Names}}" | grep -q "^$CONTAINER_NAME$"; then
              echo "Stopping existing container..."
              docker stop "$CONTAINER_NAME"
            fi

            # Remove existing container if it exists
            if docker ps -a --format "table {{.Names}}" | grep -q "^$CONTAINER_NAME$"; then
              echo "Removing existing container..."
              docker rm "$CONTAINER_NAME"
            fi

            # Run the new container with Traefik labels (path-based routing for API endpoints)
            echo "Starting new container..."
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              --network "$NETWORK" \
              -e DATABASE_URL="postgresql://epstein_reader:$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ secrets.READER_PASSWORD }}', safe=''))")@$PG_CONTAINER:5432/epstein" \
              -e INGEST_DATABASE_URL="postgresql://epstein:$(python3 -c "import urllib.parse; print(urllib.parse.quote('${{ secrets.POSTGRES_PASSWORD }}', safe=''))")@$PG_CONTAINER:5432/epstein" \
              -e API_KEY="${{ secrets.API_KEY }}" \
              -e INGEST_API_KEY="${{ secrets.INGEST_API_KEY }}" \
              -l "traefik.enable=true" \
              -l "traefik.http.routers.epstein-vector-api.rule=Host(\`$DOMAIN\`) && (Path(\`/vector_search\`) || Path(\`/text_search\`) || Path(\`/fuzzy_search\`) || Path(\`/similarity_search\`) || Path(\`/health\`) || Path(\`/ingest\`) || PathPrefix(\`/ingest/\`))" \
              -l "traefik.http.routers.epstein-vector-api.priority=100" \
              -l "traefik.http.routers.epstein-vector-api.tls=true" \
              -l "traefik.http.routers.epstein-vector-api.tls.certresolver=myresolver" \
              -l "traefik.http.services.epstein-vector-api.loadbalancer.server.port=8000" \
              "$IMAGE_NAME"

            # Wait for container to be ready
            echo "Waiting for container to be ready..."
            sleep 30

            # Check if container is running
            if docker ps --format "table {{.Names}}" | grep -q "^$CONTAINER_NAME$"; then
              echo "Container is running!"

              if curl -f -s https://"$DOMAIN"/health > /dev/null 2>&1; then
                echo "Health check passed!"
              else
                echo "Health check failed, but container is running"
                echo "Container logs:"
                docker logs --tail 50 "$CONTAINER_NAME"
              fi
            else
              echo "Container failed to start!"
              docker logs "$CONTAINER_NAME"
              exit 1
            fi

            # Clean up old images
            echo "Cleaning up old images..."
            docker image prune -af

            echo "Deployment completed!"
            echo "Application available at: https://$DOMAIN"
